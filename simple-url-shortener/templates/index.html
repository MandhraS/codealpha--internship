<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simple URL Shortener</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <p class="eyebrow">Flask + SQLite</p>
        <h1>Simple URL Shortener</h1>
        <p class="subtitle">Paste a long link and get a short redirect URL.</p>

        <form id="shorten-form" class="form">
          <label for="long-url">Long URL</label>
          <div class="input-row">
            <input
              id="long-url"
              name="long_url"
              type="url"
              placeholder="https://example.com/a/very/long/link"
              required
            />
            <button type="submit">Shorten</button>
          </div>
        </form>

        <div id="message" class="message" role="status" aria-live="polite"></div>

        <section id="result" class="result" hidden>
          <span>Your short URL</span>
          <div class="result-row">
            <a id="short-url" href="#" target="_blank" rel="noreferrer"></a>
            <button id="copy-button" type="button">Copy</button>
          </div>
        </section>
      </section>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
